services:
  panthers-agent:
    image: ghcr.io/mrgarbonzo/panthers-nft/agent:latest
    container_name: panthers-agent
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - panthers_data:/data
    environment:
      - NODE_ENV=production
      - STORAGE_BACKEND=idiostasis
      - DB_PATH=/data/panthers.db
      - PUBLIC_CACHE_PATH=/data/public-cache.json
      - PUBLIC_PORT=3000
    env_file:
      - usr/.env

volumes:
  panthers_data:
    driver: local
